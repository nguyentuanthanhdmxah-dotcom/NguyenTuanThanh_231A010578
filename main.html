<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Điện Thoại</title>
<style>
body{font-family:Arial;margin:0;transition:0.3s}
.dark{background:#121212;color:white}
header{padding:10px;background:#2196f3;color:white;display:flex;justify-content:space-between}
.container{display:flex}
.sidebar{width:200px;background:#eee;padding:10px}
.dark .sidebar{background:#333}
.products{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:10px}
.card{border:1px solid #ccc;padding:10px;transition:0.3s}
.card:hover{transform:scale(1.05)}
img{width:100%}
button{padding:5px;margin-top:5px}
</style>
</head>
<body>
<header>
<h2>📱 Shop Điện Thoại</h2>
<div>
<input type="text" id="search" placeholder="Tìm kiếm...">
<button onclick="toggleDark()">🌙</button>
</div>
</header>
<div class="container">
<div class="sidebar">
<h3>Danh mục</h3>
<ul>
<li onclick="filter('all')">Tất cả</li>
<li onclick="filter('iphone')">iPhone</li>
<li onclick="filter('samsung')">Samsung</li>
<li onclick="filter('xiaomi')">Xiaomi</li>
</ul>
</div>
<div class="products" id="list"></div>
</div>
<script>
const data=[
{name:"iPhone 15",brand:"iphone",img:"https://via.placeholder.com/150",price:2000},
{name:"iPhone 14",brand:"iphone",img:"https://via.placeholder.com/150",price:1800},
{name:"Samsung S23",brand:"samsung",img:"https://via.placeholder.com/150",price:1500},
{name:"Samsung A54",brand:"samsung",img:"https://via.placeholder.com/150",price:800},
{name:"Xiaomi 13",brand:"xiaomi",img:"https://via.placeholder.com/150",price:900},
{name:"Xiaomi Note 12",brand:"xiaomi",img:"https://via.placeholder.com/150",price:600}
];
let cart=[];
function show(list){
document.getElementById('list').innerHTML=list.map(p=>`
<div class='card'>
<img src='${p.img}'>
<h4>${p.name}</h4>
<p>${p.price}$</p>
<button onclick='add("${p.name}")'>Mua</button>
</div>`).join('');
}
function filter(type){
if(type==='all') show(data);
else show(data.filter(p=>p.brand===type));
}
function add(name){
cart.push(name);
alert("Đã thêm vào giỏ hàng");
}
document.getElementById('search').oninput=e=>{
let val=e.target.value.toLowerCase();
show(data.filter(p=>p.name.toLowerCase().includes(val)));
}
function toggleDark(){document.body.classList.toggle('dark')}
show(data);
</script>
</body>
</html>
