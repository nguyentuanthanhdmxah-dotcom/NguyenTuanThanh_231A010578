<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Điện Thoại</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<div class="menu-area">☰</div>
<h2>📱 Phone Store</h2>
<input type="text" id="search" placeholder="Tìm điện thoại...">
<button onclick="toggleDark()">🌙</button>
</header>

<!-- MENU TRÁI -->
<div class="sidebar">
<ul>
<li onclick="filter('all')">Trang chủ</li>
<li onclick="filter('iphone')">iPhone</li>
<li onclick="filter('samsung')">Samsung</li>
<li onclick="filter('xiaomi')">Xiaomi</li>
<li onclick="filter('oppo')">Oppo</li>
<li onclick="filter('vivo')">Vivo</li>
</ul>
</div>

<!-- DANH SÁCH -->
<div class="products" id="list"></div>

<!-- MODAL CHI TIẾT -->
<div class="modal" id="modal">
<div class="modal-box">
<span onclick="closeModal()">✖</span>
<img id="modalImg">
<h3 id="modalName"></h3>
<p id="modalPrice"></p>
<p>Điện thoại cao cấp, hiệu năng mạnh, camera đẹp.</p>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
