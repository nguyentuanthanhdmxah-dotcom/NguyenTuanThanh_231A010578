<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<div class="menu-area">☰</div>
<h2>📱 Phone Store</h2>
<input type="text" id="search" placeholder="Tìm điện thoại...">
<button onclick="toggleDark()">🌙</button>
</header>

<div class="sidebar">
<ul>
<li onclick="filter('all')">Trang chủ</li>
<li onclick="filter('iphone')">iPhone</li>
<li onclick="filter('samsung')">Samsung</li>
<li onclick="filter('xiaomi')">Xiaomi</li>
</ul>
</div>

<div class="products" id="list"></div>

<!-- GIỎ HÀNG -->
<div class="cart" id="cart">
<h3>🛒 Giỏ hàng</h3>
<div id="cartItems"></div>
<p id="total"></p>
<button onclick="checkout()">Đặt hàng</button>
</div>

<!-- MODAL CHI TIẾT -->
<div class="modal" id="modal">
<div class="modal-box">
<span onclick="closeModal()">✖</span>
<img id="modalImg">
<h3 id="modalName"></h3>
<p id="modalPrice"></p>
<p id="modalDesc"></p>
<button onclick="addFromDetail()">Thêm vào giỏ</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
